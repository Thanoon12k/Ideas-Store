{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans 'Delete Idea' %} — {% trans 'Fikra' %}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <div class="bg-white/60 backdrop-blur-sm rounded-2xl border border-sand-200/80 p-6 shadow-sm text-center">
        <span class="text-4xl mb-3 block">⚠️</span>
        <h1 class="text-lg font-semibold text-stone-700 mb-2">{% trans 'Delete this idea?' %}</h1>
        <p class="text-sm text-stone-500 mb-1">{{ idea.title }}</p>
        <p class="text-xs text-stone-400 mb-6">{% trans 'This action cannot be undone.' %}</p>

        <div class="flex gap-3">
            <a href="{% url 'idea_detail' idea.pk %}"
               class="flex-1 py-2.5 rounded-xl bg-sand-100 text-stone-600 text-sm font-medium
                      hover:bg-sand-200 transition-all">
                {% trans 'Cancel' %}
            </a>
            <form method="post" class="flex-1">
                {% csrf_token %}
                <button type="submit"
                    class="w-full py-2.5 rounded-xl bg-red-500 text-white text-sm font-medium
                           hover:bg-red-600 active:scale-[0.98] transition-all">
                    {% trans 'Delete' %}
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
